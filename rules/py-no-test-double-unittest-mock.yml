id: py-no-test-double-unittest-mock
language: Python
severity: error
files:
  - '**/*.py'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*_test.py'
  - '**/test_*.py'
  - '**/conftest.py'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  any:
    - pattern: import unittest.mock
    - pattern: import unittest.mock as $ALIAS
    - pattern: from unittest.mock import $$$NAMES
message: 'Non-test Python code must not import unittest.mock'
note: 'Production code must not contain mock/stub/fake usage or naming. Keep test doubles inside tests and verify production behavior with tests, not placeholders.'
metadata:
  policy_group: test-double
  approval_mode: none
  semantic_class: runtime_double_in_graph
