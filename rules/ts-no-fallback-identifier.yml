id: ts-no-fallback-identifier
language: TypeScript
severity: error
files:
  - '**/*.ts'
  - '**/*.cts'
  - '**/*.mts'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  kind: identifier
  regex: '(?i)fallback'
message: 'Identifier contains "fallback" — likely an unapproved fallback value or mechanism'
note: 'Production code should not contain fallback naming. This usually means AI introduced a hardcoded default or degraded code path. Use explicit configuration or fail loudly instead.'
metadata:
  policy_group: fallback
  approval_mode: adjacent_policy_comment
