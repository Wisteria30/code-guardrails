id: ts-no-fallback-or
language: TypeScript
severity: error
files:
  - '**/*.ts'
  - '**/*.cts'
  - '**/*.mts'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/__tests__/**'
  - '**/generated/**'
  - '**/openapi/**'
  - '**/swagger/**'
  - '**/codegen/**'
  - '**/__generated__/**'
rule:
  any:
    - pattern: $VAR = $A || $B
    - pattern: const $VAR = $A || $B
    - pattern: let $VAR = $A || $B
    - pattern: var $VAR = $A || $B
message: 'Potential fallback detected via `||` in assignment'
note: 'Fallback behavior is forbidden unless explicitly approved in requirements. If this one is intentional, add an adjacent `policy-approved: REQ-...` comment.'
metadata:
  policy_group: fallback
  approval_mode: adjacent_policy_comment
  semantic_class: fallback_unowned_default
