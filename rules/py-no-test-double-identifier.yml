id: py-no-test-double-identifier
language: Python
severity: error
files:
  - '**/*.py'
ignores:
  - '**/test/**'
  - '**/tests/**'
  - '**/*_test.py'
  - '**/test_*.py'
  - '**/conftest.py'
rule:
  kind: identifier
  regex: '(?i)(mock|stub|fake)'
message: 'Non-test Python code must not contain mock/stub/fake identifiers'
note: 'Production code must not contain mock/stub/fake usage or naming. Keep test doubles inside tests and verify production behavior with tests, not placeholders.'
metadata:
  policy_group: test-double
  approval_mode: none
