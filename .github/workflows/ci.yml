name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy types-PyYAML PyYAML
      - run: mypy check_policy.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ast-grep
        run: |
          curl -fsSL https://raw.githubusercontent.com/nicolo-ribaudo/ast-grep-setup-action/main/setup.sh | bash -s -- --version 0.36.2
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - run: pip install PyYAML pytest pytest-cov
      - run: pytest tests/ -v --tb=short
