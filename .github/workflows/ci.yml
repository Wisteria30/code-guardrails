name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy types-PyYAML PyYAML
      - run: mypy check_policy.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ast-grep
        run: |
          npm install -g @ast-grep/cli
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - run: pip install PyYAML pytest pytest-cov
      - run: pytest tests/ -v --tb=short

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest
        run: python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
      - name: Validate marketplace manifest
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
      - name: Check hook script is executable
        run: test -x hooks/post-edit-scan.sh
      - name: Check setup script is executable
        run: test -x setup
